<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntSeg Academy — Login</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      background: var(--azul-primario);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 12px;
      border: 3px solid rgba(255,255,255,0.3);
    }
    .brand h1 {
      color: white;
      font-size: 24px;
      font-weight: 800;
    }
    .brand p {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      margin-top: 4px;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-card h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--texto);
      text-align: center;
    }
    .forgot {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: var(--azul-primario);
      cursor: pointer;
    }
    .footer-brand {
      margin-top: 24px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      text-align: center;
    }
    .footer-brand span { color: rgba(255,255,255,0.8); font-weight: 600; }
    .error-msg {
      background: #FEE2E2;
      color: var(--rojo);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="brand">
    <div class="brand-logo">🛡️</div>
    <h1>IntSeg Academy</h1>
    <p>Plataforma de Capacitación</p>
  </div>

  <div class="login-card">
    <h2>Iniciar Sesión</h2>

    <div class="error-msg" id="errorMsg">
      Usuario o contraseña incorrectos. Intenta de nuevo.
    </div>

    <div class="input-group">
      <label>Usuario</label>
      <input type="text" id="usuario" placeholder="Ingresa tu usuario" autocomplete="username">
    </div>

    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" onclick="login()">Ingresar</button>

    <p class="forgot">¿Olvidaste tu contraseña?</p>
  </div>

  <p class="footer-brand">by <span>SafeR Technologies</span></p>

  <script src="js/app.js"></script>
</body>
</html>
